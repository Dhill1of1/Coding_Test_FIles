<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&family=Oswald:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <title>Deep Work Timer</title>
  </head>
  <body>
    <div class="app-container">
      <h1>deep work</h1>
      <div class="app-message">lock in. eliminate distractions.</div>
      <div class="timer-frame">
        <div class="app-circle">
          <div class="circle-shape">
            <div class="semi-circle right-side circle-mask"></div>
            <div class="semi-circle right-side circle"></div>
            <div class="semi-circle left-side circle-mask"></div>
            <div class="semi-circle left-side circle"></div>
          </div>
          <div class="app-counter-box">
            <p><span class="minutes">25</span>:<span class="seconds">00</span></p>
          </div>
          <button class="btn-start">engage</button>
        </div>
      </div>
      <div class="app-controls">
        <button class="btn-pause">hold</button>
        <button class="btn-reset">reset</button>
      </div>
    </div>
  </body>
  <script src="./app.js"></script>
</html>
